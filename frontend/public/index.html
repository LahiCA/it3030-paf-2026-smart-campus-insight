<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="Smart Campus Operations Hub - Manage facilities, bookings, and support tickets efficiently"
    />
    <meta name="og:type" content="website" />
    <meta name="og:title" content="Smart Campus Insight" />
    <meta
      name="og:description"
      content="Smart Campus Operations Hub - Manage facilities, bookings, and support tickets"
    />
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' font-weight='bold' text-anchor='middle' dominant-baseline='middle' x='50' fill='%23667eea'>🏛️</text></svg>" />
    
    <!-- Title -->
    <title>Smart Campus Insight</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics (optional) -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script> -->

    <style>
      /* Prevent flash of unstyled content */
      html {
        background-color: #f5f7fa;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
          'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',
          'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      /* Loading spinner for initial page load */
      .initial-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
          sans-serif;
      }

      .initial-loading-content {
        text-align: center;
      }

      .initial-loading-spinner {
        font-size: 48px;
        margin-bottom: 20px;
        animation: spin 1s linear infinite;
      }

      .initial-loading-text {
        font-size: 16px;
        opacity: 0.9;
        margin: 0;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <noscript>
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          text-align: center;
          padding: 20px;
        "
      >
        <div>
          <h1 style="font-size: 24px; margin-bottom: 10px">JavaScript is Required</h1>
          <p style="font-size: 16px; opacity: 0.9; margin: 0">
            Please enable JavaScript in your browser to use Smart Campus Insight.
          </p>
        </div>
      </div>
    </noscript>

    <!-- React App Root -->
    <div id="root">
      <div class="initial-loading">
        <div class="initial-loading-content">
          <div class="initial-loading-spinner">⏳</div>
          <p class="initial-loading-text">Loading Smart Campus...</p>
        </div>
      </div>
    </div>

    <!-- React Scripts -->
    <!-- Note: These will be automatically injected by react-scripts during build -->
  </body>
</html>
