spring:
  application:
    name: backend

  # Database configuration - Using H2 in-memory database for testing/demo
  datasource:
    url: jdbc:h2:mem:smartcampus
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080

# ============================================
# JWT Configuration
# ============================================
jwt:
  # IMPORTANT: In production, use a strong random secret (at least 32 characters)
  # Generate one with: openssl rand -hex 32
  # NEVER commit actual secrets to Git! Use environment variables instead.
  secret: ${JWT_SECRET:your-secret-key-change-in-production-at-least-32-characters}

# ============================================
# Google OAuth 2.0 Configuration
# ============================================
google:
  client:
    # Get this from Google Cloud Console
    # https://console.cloud.google.com/apis/credentials
    id: ${GOOGLE_CLIENT_ID:your-google-client-id-from-console}

# ============================================
# Admin Configuration
# ============================================
admin:
  # Comma-separated list of emails that should be admin
  # Example: "admin@sliit.edu,manager@sliit.edu"
  # If empty, only the first registered user becomes admin
  emails: ${ADMIN_EMAILS:}

# ============================================
# Logging Configuration
# ============================================
logging:
  level:
    root: INFO
    com.smartcampus: DEBUG
