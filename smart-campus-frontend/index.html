<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Theme -->
  <meta name="theme-color" content="#14B8A6" />

  <!-- SEO -->
  <meta name="description"
    content="Smart Campus Operations Hub - Manage facilities, bookings, and support tickets efficiently" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Smart Campus Insight" />
  <meta property="og:description"
    content="Smart Campus Operations Hub - Manage facilities, bookings, and support tickets" />

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' text-anchor='middle' x='50'>🏫</text></svg>" />

  <!-- Title -->
  <title>Smart Campus Insight</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Initial Styles -->
  <style>
    html {
      background-color: #f5f7fa;
    }

    body {
      margin: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI',
        'Roboto', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
    }

    /* Loading Screen */
    .initial-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #14B8A6 0%, #0f766e 100%);
      color: white;
      text-align: center;
    }

    .initial-loading-spinner {
      font-size: 48px;
      margin-bottom: 20px;
      animation: spin 1s linear infinite;
    }

    .initial-loading-text {
      font-size: 16px;
      opacity: 0.9;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <noscript>
    <div style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: #14B8A6;
          color: white;
          text-align: center;
        ">
      <div>
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to run this app.</p>
      </div>
    </div>
  </noscript>

  <!-- React Root -->
  <div id="root">
    <div class="initial-loading">
      <div>
        <div class="initial-loading-spinner">⏳</div>
        <div class="initial-loading-text">Loading Smart Campus...</div>
      </div>
    </div>
  </div>

  <!-- VITE ENTRY -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
